<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-label="Mugua API logo icon circles center-large no-line variant">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4E83D1"/>
      <stop offset="0.22" stop-color="#2A5FAF"/>
      <stop offset="0.55" stop-color="#123F81"/>
      <stop offset="1" stop-color="#061631"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A3CCFF"/>
      <stop offset="0.18" stop-color="#74B1FF"/>
      <stop offset="0.45" stop-color="#3D88FF"/>
      <stop offset="1" stop-color="#0A4CE0"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00132F" flood-opacity="0.12"/>
    </filter>
    <filter id="blueShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0A4CE0" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Outer structure unchanged -->
  <g filter="url(#softShadow)" fill="url(#navy)">
    <circle cx="42" cy="40" r="10"/>
    <circle cx="80" cy="37" r="11"/>
    <circle cx="118" cy="40" r="10"/>

    <circle cx="42" cy="120" r="10"/>
    <circle cx="80" cy="123" r="11"/>
    <circle cx="118" cy="120" r="10"/>
  </g>

  <!-- Middle row: center larger, sides smaller, no connecting line -->
  <g filter="url(#blueShadow)" fill="url(#blue)">
    <circle cx="40" cy="80" r="13"/>
    <circle cx="80" cy="80" r="18"/>
    <circle cx="120" cy="80" r="13"/>
  </g>
</svg>
